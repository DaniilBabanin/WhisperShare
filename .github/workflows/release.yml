name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build & sign release APK + AAB
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-35 build-tools;35.0.0 ndk;27.0.12077973 cmake;3.22.1'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      # Signed with the keystore committed at app/release.keystore (password
      # "whispershare"), wired up as the release signingConfig in
      # app/build.gradle.kts — so no secrets are needed and anyone can
      # reproduce an identically-signed build.
      - name: Build release APK and AAB
        run: ./gradlew --no-daemon assembleRelease bundleRelease

      - name: Stage artifacts
        run: |
          cp app/build/outputs/apk/release/app-release.apk WhisperShare.apk
          cp app/build/outputs/bundle/release/app-release.aab WhisperShare.aab
          ls -lh WhisperShare.apk WhisperShare.aab

      # Assert the signed APK's and AAB's certificate fingerprints match the
      # value pinned in tools/release/expected-signing-cert.sha256. Any keystore
      # swap (accidental or otherwise) fails the release here — and this is the
      # same SHA-256 Obtainium pins for signature verification.
      - name: Verify signing-cert fingerprints
        id: signing_cert
        run: |
          set -euo pipefail
          BUILD_TOOLS=$(ls -d "$ANDROID_HOME"/build-tools/35.0.0)
          EXPECTED="$(tr -d '[:space:]' < tools/release/expected-signing-cert.sha256)"
          if [ -z "$EXPECTED" ]; then
            echo "::error::tools/release/expected-signing-cert.sha256 is empty"
            exit 1
          fi
          ACTUAL="$("$BUILD_TOOLS/apksigner" verify --print-certs WhisperShare.apk \
            | awk -F': ' '/certificate SHA-256 digest/ {print tolower($2); exit}' | tr -d ' ')"
          echo "expected:   $EXPECTED"
          echo "APK actual: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "::error::could not extract signer cert SHA-256 from WhisperShare.apk"
            "$BUILD_TOOLS/apksigner" verify --print-certs WhisperShare.apk || true
            exit 1
          fi
          if [ "$EXPECTED" != "$ACTUAL" ]; then
            echo "::error::APK signing-cert SHA-256 mismatch — refusing to publish"
            exit 1
          fi
          "$BUILD_TOOLS/apksigner" verify --verbose WhisperShare.apk
          jarsigner -verify WhisperShare.aab
          AAB_ACTUAL="$(keytool -printcert -jarfile WhisperShare.aab \
            | awk -F'SHA256: ' '/SHA256:/ {print $2; exit}' \
            | tr -d ':[:space:]' | tr '[:upper:]' '[:lower:]')"
          echo "AAB actual: $AAB_ACTUAL"
          if [ -z "$AAB_ACTUAL" ]; then
            echo "::error::could not extract signer cert SHA-256 from WhisperShare.aab"
            keytool -printcert -jarfile WhisperShare.aab || true
            exit 1
          fi
          if [ "$EXPECTED" != "$AAB_ACTUAL" ]; then
            echo "::error::AAB signing-cert SHA-256 mismatch — refusing to publish"
            exit 1
          fi
          echo "fingerprint=$EXPECTED" >> "$GITHUB_OUTPUT"
          echo "signing-cert fingerprints OK"

      - name: Upload to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            WhisperShare.apk
            WhisperShare.aab
          fail_on_unmatched_files: true
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          append_body: true
          body: |
            ### Signing certificate

            Pin this SHA-256 in Obtainium ("Verify app signature on update") to
            guarantee every update is signed by the same key:

            ```
            ${{ steps.signing_cert.outputs.fingerprint }}
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
