name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build & sign release APK + AAB
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-35 build-tools;35.0.0 ndk;27.0.12077973 cmake;3.22.1'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo -n "$KEYSTORE_BASE64" | base64 -d > "$GITHUB_WORKSPACE/app/release.keystore"
          test -s "$GITHUB_WORKSPACE/app/release.keystore"

      - name: Build release APK and AAB
        env:
          WHISPERSHARE_KEYSTORE_PATH: ${{ github.workspace }}/app/release.keystore
          WHISPERSHARE_STORE_PASSWORD: ${{ secrets.WHISPERSHARE_STORE_PASSWORD }}
          WHISPERSHARE_KEY_ALIAS: ${{ secrets.WHISPERSHARE_KEY_ALIAS }}
          WHISPERSHARE_KEY_PASSWORD: ${{ secrets.WHISPERSHARE_KEY_PASSWORD }}
        run: ./gradlew --no-daemon assembleRelease bundleRelease

      - name: Stage and verify artifacts
        run: |
          cp app/build/outputs/apk/release/app-release.apk WhisperShare.apk
          cp app/build/outputs/bundle/release/app-release.aab WhisperShare.aab
          ls -lh WhisperShare.apk WhisperShare.aab
          BUILD_TOOLS=$(ls -d "$ANDROID_HOME"/build-tools/35.0.0)
          "$BUILD_TOOLS/apksigner" verify --verbose WhisperShare.apk
          "$BUILD_TOOLS/aapt" dump badging WhisperShare.apk | grep -E '^(package|application-debuggable|testOnly)' || true
          jarsigner -verify WhisperShare.aab

      - name: Remove keystore from runner
        if: always()
        run: rm -f "$GITHUB_WORKSPACE/app/release.keystore"

      - name: Upload to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            WhisperShare.apk
            WhisperShare.aab
          fail_on_unmatched_files: true
